.container{

.logo img{

}

.title{

.sub{

.timer{

.time-box{

}

.num{

    font-weight:900;

.label{

.join-btn{

    align-items:center;

    text-decoration:none;
    background:#2f6fc4;
    color:#fff;
    padding:13px 8px;
    border-radius:45px;
    font-size:16px;
    font-weight:900;
    border:4px dashed #d8ff36;
    box-shadow:0 8px 18px rgba(0,0,0,0.16);

.telegram-icon{

    height:26px;
    background:#fff;
    color:#2f6fc4;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:13px;
    font-weight:bold;
}

.powered{
    margin-top:40px;
    font-size:12px;
    color:#666;
    font-weight:600;
}

@keyframes glow{
    from{
        box-shadow:0 0 10px rgba(47,111,196,0.5);
    }
    to{
        box-shadow:0 0 24px rgba(47,111,196,0.9);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

@media(max-width:480px){

    .title{
        font-size:28px;
    }

    .join-btn{
        font-size:15px;
    }

    .num{
        font-size:26px;
    }
}

</style>
