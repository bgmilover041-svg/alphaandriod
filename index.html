<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Gaming</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#16213e,#050816 75%);
    font-family:Arial,sans-serif;
    overflow:hidden;
    color:white;
}

.container{
    width:100%;
    max-width:420px;
    text-align:center;
    padding:20px;
}

.logo{
    width:210px;
    height:210px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #00f5ff;
    box-shadow:
    0 0 20px #00f5ff,
    0 0 45px rgba(0,245,255,0.5);
}

.main-title{
    margin-top:20px;
    font-size:38px;
    font-weight:900;
    letter-spacing:2px;
    color:#00f5ff;
    text-shadow:0 0 15px rgba(0,245,255,0.7);
}

.sub-title{
    margin-top:10px;
    font-size:24px;
    font-weight:900;
    color:#ff4d6d;
    letter-spacing:2px;
    text-shadow:
    0 0 10px rgba(255,77,109,0.8),
    0 0 20px rgba(255,77,109,0.5);
}

.timer{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:14px;
}

.time-box{
    width:78px;
    padding:12px 5px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 15px rgba(255,255,255,0.05);
}

.number{
    font-size:30px;
    font-weight:bold;
    color:#ffd60a;
}

.label{
    margin-top:5px;
    font-size:11px;
    color:#ddd;
    letter-spacing:1px;
}

.telegram-btn{
    margin-top:34px;
}

.telegram-btn a{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
    padding:16px 30px;
    border-radius:50px;
    font-size:20px;
    font-weight:900;
    box-shadow:
    0 0 15px rgba(0,114,255,0.6),
    0 8px 18px rgba(0,0,0,0.35);
    animation:floating 2s ease-in-out infinite;
    transition:0.3s;
}

.telegram-btn a:hover{
    transform:scale(1.05);
}

@keyframes floating{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
    100%{
        transform:translateY(0px);
    }
}

</style>
</head>

<body>

<div class="container">

    <img src="https://i.ibb.co/twD15Y92/IMG-3967.jpg" class="logo">

    <div class="main-title">ALPHA GAMING</div>

    <div class="sub-title">BGMI OFFICIAL HACK</div>

    <div class="timer">

        <div class="time-box">
            <div class="number" id="days">00</div>
            <div class="label">DAYS</div>
        </div>

        <div class="time-box">
            <div class="number" id="hours">00</div>
            <div class="label">HOURS</div>
        </div>

        <div class="time-box">
            <div class="number" id="minutes">00</div>
            <div class="label">MINUTES</div>
        </div>

        <div class="time-box">
            <div class="number" id="seconds">00</div>
            <div class="label">SECONDS</div>
        </div>

    </div>

    <div class="telegram-btn">
        <a href="https://t.me/+eD-Sloc5Onk1ZDc1">
            ✈ JOIN TELEGRAM
        </a>
    </div>

</div>

<script>

let countdown = new Date().getTime() + (24*60*60*1000);

setInterval(function(){

let now = new Date().getTime();
let distance = countdown - now;

let days = Math.floor(distance / (1000 * 60 * 60 * 24));
let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
let seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = String(days).padStart(2,'0');
document.getElementById("hours").innerHTML = String(hours).padStart(2,'0');
document.getElementById("minutes").innerHTML = String(minutes).padStart(2,'0');
document.getElementById("seconds").innerHTML = String(seconds).padStart(2,'0');

},1000);

</script>

</body>
</html>
